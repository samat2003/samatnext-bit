name: smoke_english_24layer
dataset: english_smoke
hidden: 128
heads: 4
layers: 24
steps: 50
warmup_steps: 5
lr: 0.0003
weight_decay: 0.01
amp: true
amp_dtype: bfloat16
torch_compile: false
cuda_graph: false
seed: 0
runs:
  - candidate: sparse_24_active4_english
    layers: 24
    active_layers: 4
    recurrent_passes: 1
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
  - candidate: dense_24_observed_english
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 64
    seq: 256
  - candidate: dense_24_optimized_english
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 96
    seq: 256
