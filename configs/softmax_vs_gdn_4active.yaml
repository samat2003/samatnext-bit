name: fp16_softmax_vs_gdn_4active
validation_experiment: true
baseline_candidate: dense4_softmax_chainrule
dataset: english_validation
train_split: 0.9
hidden: 128
heads: 4
layers: 4
warmup_steps: 5
validation_batches: 8
checkpoints: [0, 100, 200, 300, 400, 500]
preloaded_train_batches: 512
lr: 0.0003
weight_decay: 0.01
amp: true
amp_dtype: float16
torch_compile: false
cuda_graph: false
seed: 0
runs:
  - candidate: dense4_softmax_chainrule
    comparison_type: softmax_vs_gdn_4active
    layers: 4
    active_layers: 4
    recurrent_passes: 1
    mixer_type: softmax
    mode: fp_chainrule
    batch: 64
    seq: 256
    steps: 500
  - candidate: dense4_gdn_chainrule
    comparison_type: softmax_vs_gdn_4active
    layers: 4
    active_layers: 4
    recurrent_passes: 1
    mixer_type: simple_gdn
    mode: fp_chainrule
    batch: 64
    seq: 256
    steps: 500
