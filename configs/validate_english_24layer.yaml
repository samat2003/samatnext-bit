name: validate_english_24layer
validation_experiment: true
dataset: english_validation
train_split: 0.9
hidden: 128
heads: 4
layers: 24
steps: 300
warmup_steps: 5
validation_batches: 8
checkpoints: [0, 50, 100, 150, 200, 250, 300]
lr: 0.0003
weight_decay: 0.01
amp: true
amp_dtype: bfloat16
torch_compile: false
cuda_graph: false
seed: 0
runs:
  - candidate: dense_24_24_quality_speed
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 96
    seq: 256
  - candidate: dense_24_24_quality_speed_b64
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 64
    seq: 256
  - candidate: sparse_24_active4_quality_speed
    layers: 24
    active_layers: 4
    recurrent_passes: 1
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
