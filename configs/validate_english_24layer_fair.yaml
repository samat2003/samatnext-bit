name: validate_english_24layer_fair
validation_experiment: true
dataset: english_validation
train_split: 0.9
hidden: 128
heads: 4
layers: 24
warmup_steps: 5
validation_batches: 8
checkpoints: [0, 250, 500, 750, 1000, 1250, 1500, 1750, 2000, 2500, 3000, 3500, 4000]
update_checkpoints: [50, 100, 150, 200, 250]
preloaded_train_batches: 512
lr: 0.0003
weight_decay: 0.01
amp: true
amp_dtype: bfloat16
torch_compile: false
cuda_graph: false
seed: 0
runs:
  - candidate: dense_24_24_equal_updates
    comparison_type: equal_updates
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 96
    seq: 256
    steps: 4000
  - candidate: sparse_24_active4_equal_updates
    comparison_type: equal_updates
    layers: 24
    active_layers: 4
    recurrent_passes: 1
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
    steps: 2000
  - candidate: dense_24_24_equal_steps
    comparison_type: equal_steps
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 96
    seq: 256
    steps: 2000
  - candidate: sparse_24_active4_equal_steps
    comparison_type: equal_steps
    layers: 24
    active_layers: 4
    recurrent_passes: 1
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
    steps: 2000
  - candidate: sparse_24_active4_recurrent2_equal_steps
    comparison_type: equal_steps
    layers: 24
    active_layers: 4
    recurrent_passes: 2
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
    steps: 2000
  - candidate: dense_24_24_equal_wallclock
    comparison_type: equal_wallclock
    budget_name: dense_wallclock_2000
    layers: 24
    active_layers: 24
    recurrent_passes: 1
    mode: fp_mono_update_every_16
    batch: 96
    seq: 256
    steps: 2000
  - candidate: sparse_24_active4_equal_wallclock
    comparison_type: equal_wallclock
    max_seconds_from: dense_wallclock_2000
    layers: 24
    active_layers: 4
    recurrent_passes: 1
    mode: fp_mono_update_every_8
    batch: 64
    seq: 256
    steps: 50000
